<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 06: AREA - Bitácora UA</title>
    <style>
        /* ... (tus variables y estilos básicos se mantienen) ... */
        
        /* CORRECCIÓN CRÍTICA PARA EL VIDEO */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Relación 16:9 exacta */
            background-color: #000;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Elimina espacios extra */
        }
        /* ... resto de tu CSS ... */
    </style>
</head>
<body>
    <section class="cuadro-anaranjado">
        <h2>📹 Video Explicativo</h2>
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/G78cSgia6Hk" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen>
            </iframe>
        </div>
    </section>
    </body>
</html>
